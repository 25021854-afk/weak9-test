name: Multi-OS Unit Tests - Bai 9.4

on: 
  push:
    paths:
      - 'Bai9.4 đa hệ điều hành vs MatrixStrategy/**' # Chỉ chạy khi có thay đổi trong bài 9.4

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with Maven
        # CHÚ Ý: Thêm working-directory trỏ vào đúng thư mục bài 9.4
        working-directory: "./Bai9.4 matrixstrategy"
        run: mvn test
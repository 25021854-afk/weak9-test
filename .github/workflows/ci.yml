name: Java CI for Bai 9.3

on:
  push:
    paths:
      - 'Bai9.3 CI,CD automation/**'
    branches: [ main ]
  pull_request:
    paths:
      - 'Bai9.3 CI,CD automation/**'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Nâng cấp lên v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # Nâng cấp lên v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      working-directory: "Bai9.3 CI,CD automation"
      run: mvn clean package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # ĐÂY LÀ CHỖ QUAN TRỌNG NHẤT - Đổi v3 thành v4
      with:
        name: Bai9.3-Jar-File
        path: "Bai9.3 CI,CD automation/target/*.jar"
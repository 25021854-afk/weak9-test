name: CI/CD Pipeline Optimization & Caching (Bai 6)

on:
  push:
    paths:
      - 'Bai9.6/**'
      - '.github/workflows/bai6.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Bước quan trọng nhất: Kích hoạt caching cho Maven
          cache: 'maven'

      - name: Build with Maven
        # Chạy lệnh trong thư mục bai6 để tránh ảnh hưởng các bài khác
        run: mvn -B package --file Bai9.6/pom.xml